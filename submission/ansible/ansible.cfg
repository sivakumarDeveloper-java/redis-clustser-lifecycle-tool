[defaults]
inventory = inventory/hosts.ini
roles_path = roles
remote_user = root
# Generated by `redis-tool infra up` and baked into the containers. The CLI also
# exports ANSIBLE_PRIVATE_KEY_FILE (absolute) so this works from any cwd.
private_key_file = keys/redis_cluster
host_key_checking = False
interpreter_python = /usr/bin/python3
deprecation_warnings = False
retry_files_enabled = False
stdout_callback = default
# Per-node SSH on forwarded ports is fast; keep forks high so the 6 nodes
# provision in parallel.
forks = 6
timeout = 30

[ssh_connection]
pipelining = True
# -o options keep SSH quiet & non-interactive against the per-port localhost
# endpoints exposed by the container runtime.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
