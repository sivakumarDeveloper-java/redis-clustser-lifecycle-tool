[redis_nodes]
redis-node-1 ansible_host=127.0.0.1 ansible_port=2211 redis_ip=10.10.0.11 node_index=1
redis-node-2 ansible_host=127.0.0.1 ansible_port=2212 redis_ip=10.10.0.12 node_index=2
redis-node-3 ansible_host=127.0.0.1 ansible_port=2213 redis_ip=10.10.0.13 node_index=3
redis-node-4 ansible_host=127.0.0.1 ansible_port=2214 redis_ip=10.10.0.14 node_index=4
redis-node-5 ansible_host=127.0.0.1 ansible_port=2215 redis_ip=10.10.0.15 node_index=5
redis-node-6 ansible_host=127.0.0.1 ansible_port=2216 redis_ip=10.10.0.16 node_index=6

[redis_scale_nodes]

redis-node-7 ansible_host=127.0.0.1 ansible_port=2217 redis_ip=10.10.0.17 node_index=7

redis-node-8 ansible_host=127.0.0.1 ansible_port=2218 redis_ip=10.10.0.18 node_index=8

[redis_masters]
redis-node-1
redis-node-2
redis-node-3

[redis_replicas]
redis-node-4
redis-node-5
redis-node-6

[cluster:children]
redis_nodes
redis_scale_nodes

[cluster:vars]
ansible_user=root
# Key is generated by `redis-tool infra up` (ansible/keys/redis_cluster) and
# baked into the containers; the CLI also sets ANSIBLE_PRIVATE_KEY_FILE to its
# absolute path. Relative path here (resolved from the ansible/ dir) lets manual
# `ansible-playbook` runs from that directory work too.
ansible_ssh_private_key_file=keys/redis_cluster
ansible_python_interpreter=/usr/bin/python3
redis_port=6379
redis_cluster_bus_port=16379
